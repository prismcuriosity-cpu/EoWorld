# EoWorld · EoMT-B (DINOv2) · CholecSeg8k semantic segmentation (13 classes)
# ---------------------------------------------------------------------------
# Mid-point backbone — likely default for the fast-track plan (§11.1) and the
# backbone-size ablation (§9). DINOv2 weights are NOT gated.
#
# Run:
#   PYTHONPATH=/path/to/EoWorld python main.py fit \
#     -c /path/to/EoWorld/configs/cholecseg8k/semantic/eomt_base_640_dinov2.yaml \
#     --data.path /path/to/cholecseg8k \
#     --model.ckpt_path /path/to/coco_panoptic_eomt_base_640_2x/pytorch_model.bin \
#     --model.load_ckpt_class_head False
#
# Annealing steps assume 5,650 train frames · batch_size 8 · 40 epochs.
trainer:
  max_epochs: 40
  devices: 1
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eoworld"
      name: "cholecseg8k_semantic_eomt_base_640_dinov2"
model:
  class_path: training.mask_classification_semantic.MaskClassificationSemantic
  init_args:
    attn_mask_annealing_enabled: True
    attn_mask_annealing_start_steps: [0, 9134, 13688, 18241]
    attn_mask_annealing_end_steps: [4185, 13688, 18241, 22794]
    network:
      class_path: models.eomt.EoMT
      init_args:
        num_q: 100
        encoder:
          class_path: models.vit.ViT
          init_args:
            backbone_name: vit_base_patch14_reg4_dinov2
data:
  class_path: eoworld.data.cholecseg8k.CholecSeg8kSemantic
  init_args:
    img_size: [640, 640]
    batch_size: 8
    num_workers: 8
