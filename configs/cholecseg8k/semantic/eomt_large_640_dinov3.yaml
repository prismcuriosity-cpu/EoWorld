# EoWorld · EoMT-L (DINOv3) · CholecSeg8k semantic segmentation (13 classes)
# ---------------------------------------------------------------------------
# OPTIONAL / GATED. DINOv3-based EoMT weights are distributed as DELTAS relative
# to Meta's original DINOv3 weights, which require separate gated access
# (proposal §4.1.1 & risk table §13). Request that access on day one; until it
# lands, use the DINOv2 configs — they are ungated and the recommended default.
#
# With DINOv3 access:
#   PYTHONPATH=/path/to/EoWorld python main.py fit \
#     -c /path/to/EoWorld/configs/cholecseg8k/semantic/eomt_large_640_dinov3.yaml \
#     --data.path /path/to/cholecseg8k \
#     --model.ckpt_path /path/to/coco_panoptic_eomt_large_640_dinov3/pytorch_model.bin \
#     --model.load_ckpt_class_head False
#   # delta_weights defaults to True below; add --model.delta_weights False only
#   # if your checkpoint is already absolute (not a delta).
#
# Annealing steps assume 5,650 train frames · batch_size 4 · 30 epochs.
trainer:
  max_epochs: 30
  devices: 1
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eoworld"
      name: "cholecseg8k_semantic_eomt_large_640_dinov3"
model:
  class_path: training.mask_classification_semantic.MaskClassificationSemantic
  init_args:
    attn_mask_annealing_enabled: True
    attn_mask_annealing_start_steps: [0, 13692, 20517, 27342]
    attn_mask_annealing_end_steps: [6274, 20517, 27342, 34166]
    delta_weights: True
    network:
      class_path: models.eomt.EoMT
      init_args:
        num_q: 100
        encoder:
          class_path: models.vit.ViT
          init_args:
            backbone_name: facebook/dinov3-vitl16-pretrain-lvd1689m
data:
  class_path: eoworld.data.cholecseg8k.CholecSeg8kSemantic
  init_args:
    img_size: [640, 640]
    batch_size: 4
    num_workers: 8
